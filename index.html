<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="세상도감">
<title>세상 도감</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --green: #4ade80;
    --green2: #22c55e;
    --amber: #fbbf24;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --coral: #fb7185;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --radius: 16px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Pretendard', sans-serif; background: var(--bg); color: var(--text); }

  /* APP SHELL */
  #app { height: 100vh; display: flex; flex-direction: column; }
  #screen { flex: 1; overflow: hidden; position: relative; }
  .page { position: absolute; inset: 0; overflow-y: auto; display: none; flex-direction: column; }
  .page.active { display: flex; }

  /* NAV */
  #nav { display: flex; background: var(--bg2); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; border: none; background: none; color: var(--text3); cursor: pointer; transition: color 0.2s; font-size: 10px; }
  .nav-btn.active { color: var(--green); }
  .nav-btn i { font-size: 22px; }
  .nav-btn.capture-btn { color: var(--green); }
  .nav-btn.capture-btn i { font-size: 28px; }

  /* HOME PAGE */
  .home-header { padding: 20px 20px 12px; display: flex; justify-content: space-between; align-items: flex-end; }
  .home-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .home-title span { color: var(--green); }
  .progress-summary { font-size: 12px; color: var(--text2); }
  
  .progress-bar-wrap { margin: 0 20px 20px; background: var(--bg3); border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green2), var(--blue)); border-radius: 99px; transition: width 0.5s ease; }

  .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 20px; }
  .cat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: transform 0.15s, border-color 0.15s; position: relative; overflow: hidden; }
  .cat-card:active { transform: scale(0.97); }
  .cat-card.has-items { border-color: var(--border2); }
  .cat-icon { font-size: 34px; margin-bottom: 10px; display: block; }
  .cat-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .cat-count { font-size: 12px; color: var(--text2); }
  .cat-new-badge { position: absolute; top: 10px; right: 10px; background: var(--coral); color: white; font-size: 9px; font-weight: 700; border-radius: 99px; padding: 2px 7px; }
  .cat-prog { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--bg3); }
  .cat-prog-fill { height: 100%; background: var(--green); border-radius: 0 99px 99px 0; }

  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 20px 10px; }

  .recent-row { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 20px; scrollbar-width: none; }
  .recent-row::-webkit-scrollbar { display: none; }
  .recent-item { flex: 0 0 90px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
  .recent-img { width: 80px; height: 80px; border-radius: var(--radius-sm); object-fit: cover; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .recent-label { font-size: 11px; color: var(--text2); text-align: center; line-height: 1.3; }

  /* CAPTURE PAGE */
  .capture-page { background: #000; }
  #camera-view { width: 100%; flex: 1; object-fit: cover; display: block; }
  .camera-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--text2); }
  .camera-placeholder i { font-size: 64px; opacity: 0.3; }
  .camera-ui { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .shutter-row { display: flex; align-items: center; justify-content: space-between; }
  .shutter-btn { width: 72px; height: 72px; border-radius: 50%; background: white; border: 4px solid rgba(255,255,255,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
  .shutter-btn:active { transform: scale(0.93); }
  .shutter-inner { width: 56px; height: 56px; border-radius: 50%; background: white; }
  .or-divider { display: flex; align-items: center; gap: 10px; color: var(--text3); font-size: 12px; }
  .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .gallery-btn { width: 100%; padding: 14px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

  /* SCAN RESULT MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet { width: 100%; background: var(--bg2); border-radius: 24px 24px 0 0; padding: 24px 20px; padding-bottom: calc(24px + var(--safe-bottom)); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-drag { width: 40px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 20px; }
  .result-img-wrap { width: 100%; height: 180px; border-radius: var(--radius); overflow: hidden; background: var(--bg3); margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 72px; }
  .result-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .result-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .result-category { display: inline-flex; align-items: center; gap: 5px; background: var(--bg3); border-radius: 99px; padding: 4px 12px; font-size: 12px; color: var(--text2); margin-bottom: 12px; }
  .result-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
  .ai-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); margin-bottom: 14px; }
  .ai-badge::before { content: '✦'; }
  .result-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-primary { background: var(--green); color: #0a0f0a; font-weight: 700; font-size: 15px; padding: 14px; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:active { opacity: 0.85; }
  .btn-secondary { background: var(--bg3); color: var(--text); font-size: 15px; padding: 14px; border: 1px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; }
  .confidence-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .conf-label { font-size: 12px; color: var(--text3); }
  .conf-bar { flex: 1; height: 4px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .conf-fill { height: 100%; background: var(--green); border-radius: 99px; }
  .conf-pct { font-size: 12px; color: var(--green); font-weight: 600; }

  /* DEX LIST PAGE */
  .dex-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
  .dex-header h2 { font-size: 20px; font-weight: 700; }
  .filter-row { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px 14px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { flex: 0 0 auto; padding: 7px 14px; border-radius: 99px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); transition: all 0.15s; }
  .filter-chip.active { background: var(--green); border-color: var(--green); color: #0a0f0a; font-weight: 600; }
  .dex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 20px; }
  .dex-cell { aspect-ratio: 1; border-radius: var(--radius-sm); background: var(--bg2); border: 1px solid var(--border); overflow: hidden; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 36px; transition: transform 0.15s; }
  .dex-cell:active { transform: scale(0.95); }
  .dex-cell img { width: 100%; height: 100%; object-fit: cover; }
  .dex-cell.empty { opacity: 0.25; }
  .dex-cell.empty::after { content: '?'; font-size: 28px; color: var(--text3); font-weight: 700; }
  .dex-number { position: absolute; top: 4px; left: 6px; font-size: 10px; color: var(--text3); font-weight: 600; }
  .dex-label { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 12px 4px 4px; font-size: 10px; text-align: center; color: white; font-weight: 500; }

  /* DETAIL MODAL */
  .detail-sheet { max-height: 85vh; overflow-y: auto; }
  .detail-img { width: 100%; height: 220px; object-fit: cover; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 80px; border-radius: var(--radius); margin-bottom: 16px; }
  .detail-num { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag { background: var(--bg3); border-radius: 99px; padding: 4px 12px; font-size: 12px; color: var(--text2); }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .info-cell { background: var(--bg3); border-radius: var(--radius-sm); padding: 12px; }
  .info-cell-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .info-cell-value { font-size: 14px; font-weight: 600; }
  .detail-desc { font-size: 14px; color: var(--text2); line-height: 1.7; }

  /* PROFILE PAGE */
  .profile-page { padding: 20px; }
  .profile-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--bg3); border: 2px solid var(--green); display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .profile-name { font-size: 20px; font-weight: 700; }
  .profile-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--green); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .achievement-list { display: flex; flex-direction: column; gap: 10px; }
  .achievement { display: flex; align-items: center; gap: 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
  .ach-icon { font-size: 28px; flex: 0 0 auto; }
  .ach-name { font-size: 14px; font-weight: 600; }
  .ach-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .ach-locked { opacity: 0.4; filter: grayscale(1); }

  /* LOADING */
  .scan-loading { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 30px 0; }
  .spin { width: 48px; height: 48px; border: 3px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scan-text { font-size: 14px; color: var(--text2); }

  /* MISC */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--text3); padding: 40px 20px; }
  .empty-state i { font-size: 56px; opacity: 0.3; }
  .empty-state p { font-size: 14px; text-align: center; line-height: 1.6; }
  input[type=text], input[type=file] { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; width: 100%; }
  input[type=text]:focus { outline: none; border-color: var(--green); }
  #fileInput { display: none; }
</style>
</head>
<body>
<div id="app">
  <div id="screen">

    <!-- ===== HOME PAGE ===== -->
    <div class="page active" id="page-home">
      <div class="home-header">
        <div>
          <div class="home-title">세상 <span>도감</span></div>
          <div class="progress-summary" id="progress-text">0종 발견 중</div>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="main-progress" style="width:0%"></div>
      </div>

      <div class="section-title">카테고리</div>
      <div class="category-grid" id="cat-grid"></div>

      <div class="section-title" id="recent-title" style="display:none">최근 발견</div>
      <div class="recent-row" id="recent-row"></div>
    </div>

    <!-- ===== CAPTURE PAGE ===== -->
    <div class="page" id="page-capture">
      <div class="capture-page" style="display:flex;flex-direction:column;height:100%;">
        <video id="camera-view" autoplay playsinline style="display:none;flex:1;object-fit:cover;"></video>
        <canvas id="snap-canvas" style="display:none;"></canvas>
        <div class="camera-placeholder" id="cam-placeholder">
          <i class="ti ti-camera-off"></i>
          <p style="font-size:14px;">카메라를 시작하세요</p>
        </div>
        <div class="camera-ui">
          <div class="shutter-row">
            <button onclick="openGallery()" style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);width:52px;height:52px;display:flex;align-items:center;justify-content:center;color:var(--text2);">
              <i class="ti ti-photo" style="font-size:22px;"></i>
            </button>
            <div class="shutter-btn" onclick="takePhoto()">
              <div class="shutter-inner"></div>
            </div>
            <button onclick="toggleCamera()" style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);width:52px;height:52px;display:flex;align-items:center;justify-content:center;color:var(--text2);">
              <i class="ti ti-camera-rotate" style="font-size:22px;"></i>
            </button>
          </div>
          <div class="or-divider">또는</div>
          <label class="gallery-btn" for="fileInput">
            <i class="ti ti-upload"></i> 갤러리에서 선택
          </label>
          <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        </div>
      </div>
    </div>

    <!-- ===== DEX LIST PAGE ===== -->
    <div class="page" id="page-dex">
      <div class="dex-header">
        <h2>내 도감</h2>
        <span id="dex-count-badge" style="font-size:13px;color:var(--text2);"></span>
      </div>
      <div class="filter-row" id="filter-row"></div>
      <div class="dex-grid" id="dex-grid"></div>
    </div>

    <!-- ===== PROFILE PAGE ===== -->
    <div class="page" id="page-profile">
      <div class="profile-page">
        <div class="profile-header">
          <div class="avatar">🧭</div>
          <div>
            <div class="profile-name">탐험가</div>
            <div class="profile-sub" id="profile-sub">도감 수집을 시작해보세요!</div>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" id="st1">0</div><div class="stat-label">총 발견</div></div>
          <div class="stat-card"><div class="stat-num" id="st2">0</div><div class="stat-label">카테고리</div></div>
          <div class="stat-card"><div class="stat-num" id="st3">0</div><div class="stat-label">이번 주</div></div>
        </div>
        <div class="section-title" style="padding-left:0">업적</div>
        <div class="achievement-list" id="ach-list"></div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav id="nav">
    <button class="nav-btn active" onclick="goPage('home',this)">
      <i class="ti ti-home"></i>홈
    </button>
    <button class="nav-btn capture-btn" onclick="goPage('capture',this);startCamera()">
      <i class="ti ti-camera"></i>촬영
    </button>
    <button class="nav-btn" onclick="goPage('dex',this);renderDex()">
      <i class="ti ti-book"></i>도감
    </button>
    <button class="nav-btn" onclick="goPage('profile',this);renderProfile()">
      <i class="ti ti-user"></i>나
    </button>
  </nav>
</div>

<!-- SCAN RESULT MODAL -->
<div class="modal-overlay" id="result-modal">
  <div class="modal-sheet">
    <div class="modal-drag"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-sheet detail-sheet">
    <div class="modal-drag"></div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────
const CATEGORIES = [
  { id:'household', name:'생활용품', icon:'🏠', color:'#60a5fa', total:50 },
  { id:'nature',    name:'자연·식물', icon:'🌿', color:'#4ade80', total:60 },
  { id:'animal',    name:'동물·곤충', icon:'🐾', color:'#fbbf24', total:80 },
  { id:'food',      name:'음식',      icon:'🍱', color:'#fb7185', total:70 },
  { id:'tech',      name:'전자·기기', icon:'💻', color:'#a78bfa', total:40 },
  { id:'other',     name:'기타',      icon:'🌀', color:'#94a3b8', total:30 }
];

const ACHIEVEMENTS = [
  { id:'first',     icon:'🌱', name:'첫 발견!',     desc:'도감에 첫 번째 항목 등록',         req: e=>e.length>=1 },
  { id:'ten',       icon:'⭐', name:'10종 탐험가',  desc:'10가지 이상 발견',                 req: e=>e.length>=10 },
  { id:'variety',   icon:'🎨', name:'다재다능',     desc:'3개 이상 카테고리 탐험',            req: e=>new Set(e.map(x=>x.category)).size>=3 },
  { id:'hundred',   icon:'🏆', name:'100종 마스터', desc:'100가지 이상 발견',                req: e=>e.length>=100 },
];

let db = JSON.parse(localStorage.getItem('dex-entries') || '[]');
let capturedImage = null;
let cameraStream = null;
let facingMode = 'environment';
let currentFilter = 'all';

function saveDb() { localStorage.setItem('dex-entries', JSON.stringify(db)); }

// ─── NAVIGATION ──────────────────────────────────────────
function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(id==='home') renderHome();
}

// ─── HOME ─────────────────────────────────────────────────
function renderHome() {
  const total = CATEGORIES.reduce((a,c)=>a+c.total,0);
  const found = db.length;
  document.getElementById('progress-text').textContent = `${found}종 발견 · 전체 ${total}종`;
  document.getElementById('main-progress').style.width = Math.min(100, found/total*100)+'%';

  const grid = document.getElementById('cat-grid');
  grid.innerHTML = CATEGORIES.map(cat=>{
    const items = db.filter(e=>e.category===cat.id);
    const pct = Math.min(100, items.length/cat.total*100);
    const isNew = items.some(i=>Date.now()-i.timestamp<3600000*2);
    return `<div class="cat-card ${items.length>0?'has-items':''}" onclick="goToCat('${cat.id}')">
      ${isNew?'<span class="cat-new-badge">NEW</span>':''}
      <span class="cat-icon">${cat.icon}</span>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count">${items.length} / ${cat.total}</div>
      <div class="cat-prog"><div class="cat-prog-fill" style="width:${pct}%;background:${cat.color}"></div></div>
    </div>`;
  }).join('');

  const recent = [...db].sort((a,b)=>b.timestamp-a.timestamp).slice(0,10);
  if(recent.length) {
    document.getElementById('recent-title').style.display='';
    document.getElementById('recent-row').innerHTML = recent.map(e=>`
      <div class="recent-item" onclick="showDetail('${e.id}')">
        <div class="recent-img">${e.imageData?`<img src="${e.imageData}" style="width:80px;height:80px;object-fit:cover;border-radius:10px;">`:e.emoji||'📦'}</div>
        <div class="recent-label">${e.name}</div>
      </div>`).join('');
  }
}

function goToCat(id) {
  currentFilter = id;
  goPage('dex', document.querySelectorAll('.nav-btn')[2]);
  renderDex();
}

// ─── CAMERA ──────────────────────────────────────────────
async function startCamera() {
  try {
    if(cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); }
    cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode}});
    const v = document.getElementById('camera-view');
    v.srcObject = cameraStream;
    v.style.display='block';
    document.getElementById('cam-placeholder').style.display='none';
  } catch(e) {
    console.log('Camera error:', e);
  }
}

function toggleCamera() {
  facingMode = facingMode==='environment'?'user':'environment';
  startCamera();
}

function takePhoto() {
  const v = document.getElementById('camera-view');
  if(!v.srcObject) { openGallery(); return; }
  const c = document.getElementById('snap-canvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  capturedImage = c.toDataURL('image/jpeg',0.8);
  analyzeImage(capturedImage);
}

function openGallery() { document.getElementById('fileInput').click(); }

function handleFileSelect(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => { capturedImage=ev.target.result; analyzeImage(capturedImage); };
  reader.readAsDataURL(file);
  e.target.value='';
}

// ─── AI ANALYSIS ─────────────────────────────────────────
async function analyzeImage(imgData) {
  showModal('result-modal');
  document.getElementById('modal-content').innerHTML = `
    <div class="scan-loading">
      <div class="spin"></div>
      <div class="scan-text">AI가 분석 중...</div>
    </div>`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:600,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData.split(',')[1]}},
          {type:'text',text:`이 이미지에서 가장 주요한 사물/생물/식물을 도감 형식으로 분석해주세요.
반드시 아래 JSON만 응답하세요. 다른 텍스트 없이:
{
  "name": "한국어 이름",
  "englishName": "영어 이름",
  "category": "household|nature|animal|food|tech|other 중 하나",
  "categoryIcon": "카테고리 이모지",
  "emoji": "이 사물을 표현하는 이모지 1개",
  "confidence": 숫자(0-100),
  "shortDesc": "2문장 이내 간단 설명",
  "tags": ["태그1","태그2","태그3"],
  "habitat": "서식지 또는 주로 볼 수 있는 곳",
  "rarity": "흔함|보통|희귀|매우희귀"
}`}
        ]}]
      })
    });
    const data = await resp.json();
    const text = data.content.map(i=>i.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);
    showScanResult(result, imgData);
  } catch(err) {
    showManualEntry(imgData);
  }
}

function showScanResult(r, imgData) {
  const conf = r.confidence||80;
  document.getElementById('modal-content').innerHTML = `
    <div class="result-img-wrap">${imgData?`<img src="${imgData}">`:r.emoji}</div>
    <div class="ai-badge">AI 분석 완료</div>
    <div class="result-name">${r.name}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span class="result-category"><span>${r.categoryIcon||'📦'}</span>${CATEGORIES.find(c=>c.id===r.category)?.name||'기타'}</span>
      <span style="font-size:12px;color:var(--amber);font-weight:600;">${r.rarity||'보통'}</span>
    </div>
    <div class="confidence-row">
      <span class="conf-label">인식 정확도</span>
      <div class="conf-bar"><div class="conf-fill" style="width:${conf}%"></div></div>
      <span class="conf-pct">${conf}%</span>
    </div>
    <div class="result-desc">${r.shortDesc}</div>
    <div class="tags-row">${(r.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="closeModal('result-modal')">다시 찍기</button>
      <button class="btn-primary" onclick="registerEntry(${JSON.stringify(r).replace(/"/g,'&quot;')},'${imgData?imgData.substring(0,30):''}')">도감에 추가!</button>
    </div>`;
  // store imgData globally for registration
  window._pendingImg = imgData;
}

function showManualEntry(imgData) {
  window._pendingImg = imgData;
  document.getElementById('modal-content').innerHTML = `
    <div class="result-img-wrap">${imgData?`<img src="${imgData}">`:'📷'}</div>
    <div style="margin-bottom:16px;">
      <div style="font-size:16px;font-weight:600;margin-bottom:12px;">직접 등록하기</div>
      <input type="text" id="manual-name" placeholder="이름 (예: 볼펜, 민들레)" style="margin-bottom:8px;">
      <select id="manual-cat" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;width:100%;font-size:14px;">
        ${CATEGORIES.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}
      </select>
    </div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="closeModal('result-modal')">취소</button>
      <button class="btn-primary" onclick="manualRegister()">도감에 추가!</button>
    </div>`;
}

function manualRegister() {
  const name = document.getElementById('manual-name').value.trim();
  if(!name) return;
  const cat = document.getElementById('manual-cat').value;
  const catObj = CATEGORIES.find(c=>c.id===cat);
  const r = { name, englishName:'', category:cat, categoryIcon:catObj?.icon||'📦', emoji:catObj?.icon||'📦', confidence:100, shortDesc:'직접 등록한 항목입니다.', tags:[], rarity:'보통' };
  registerEntry(r);
}

function registerEntry(r, _unused) {
  const imgData = window._pendingImg;
  const already = db.find(e=>e.name===r.name);
  const entry = {
    id: Date.now().toString(),
    name: r.name,
    englishName: r.englishName||'',
    category: r.category||'other',
    emoji: r.emoji||'📦',
    imageData: imgData||null,
    shortDesc: r.shortDesc||'',
    tags: r.tags||[],
    rarity: r.rarity||'보통',
    habitat: r.habitat||'',
    confidence: r.confidence||100,
    timestamp: Date.now()
  };

  if(!already) {
    db.push(entry);
    saveDb();
    closeModal('result-modal');
    showToast(r.name + ' 등록 완료! 🎉');
    renderHome();
    goPage('home', document.querySelectorAll('.nav-btn')[0]);
  } else {
    closeModal('result-modal');
    showToast('이미 도감에 있어요!');
  }
  window._pendingImg = null;
}

// ─── DEX LIST ────────────────────────────────────────────
function renderDex() {
  const filterRow = document.getElementById('filter-row');
  filterRow.innerHTML = `<div class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">전체</div>`
    + CATEGORIES.map(c=>`<div class="filter-chip ${currentFilter===c.id?'active':''}" onclick="setFilter('${c.id}')">${c.icon} ${c.name}</div>`).join('');

  const items = currentFilter==='all' ? db : db.filter(e=>e.category===currentFilter);
  const cat = CATEGORIES.find(c=>c.id===currentFilter);
  const total = cat ? cat.total : CATEGORIES.reduce((a,c)=>a+c.total,0);
  document.getElementById('dex-count-badge').textContent = `${items.length} / ${total}종`;

  const sorted = [...items].sort((a,b)=>b.timestamp-a.timestamp);
  const empties = Math.max(0, Math.min(9, total - items.length));
  
  document.getElementById('dex-grid').innerHTML =
    sorted.map((e,i)=>`
      <div class="dex-cell" onclick="showDetail('${e.id}')">
        <span class="dex-number">#${String(i+1).padStart(3,'0')}</span>
        ${e.imageData?`<img src="${e.imageData}">`:`<span style="font-size:38px">${e.emoji}</span>`}
        <div class="dex-label">${e.name}</div>
      </div>`).join('')
    + Array(empties).fill('<div class="dex-cell empty"></div>').join('');
}

function setFilter(id) {
  currentFilter = id;
  renderDex();
}

// ─── DETAIL ──────────────────────────────────────────────
function showDetail(id) {
  const e = db.find(x=>x.id===id);
  if(!e) return;
  const cat = CATEGORIES.find(c=>c.id===e.category);
  const idx = db.indexOf(e)+1;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-img">${e.imageData?`<img src="${e.imageData}" style="width:100%;height:220px;object-fit:cover;border-radius:var(--radius);">`:e.emoji}</div>
    <div class="detail-num">#${String(idx).padStart(3,'0')} · ${cat?.name||'기타'}</div>
    <div class="detail-title">${e.name}${e.englishName?` <span style="font-size:16px;color:var(--text2);font-weight:400;">${e.englishName}</span>`:''}</div>
    <div class="tags-row">
      <span class="tag" style="color:var(--amber)">${e.rarity}</span>
      ${e.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-cell-label">발견일</div><div class="info-cell-value">${new Date(e.timestamp).toLocaleDateString('ko')}</div></div>
      ${e.habitat?`<div class="info-cell"><div class="info-cell-label">주요 서식처</div><div class="info-cell-value" style="font-size:13px;">${e.habitat}</div></div>`:''}
    </div>
    <div class="detail-desc">${e.shortDesc}</div>
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button class="btn-secondary" style="flex:1;" onclick="closeModal('detail-modal')">닫기</button>
      <button style="background:var(--coral);color:white;border:none;border-radius:10px;padding:14px;flex:0 0 auto;cursor:pointer;" onclick="deleteEntry('${e.id}')"><i class="ti ti-trash"></i></button>
    </div>`;
  showModal('detail-modal');
}

function deleteEntry(id) {
  if(!confirm('삭제할까요?')) return;
  db = db.filter(e=>e.id!==id);
  saveDb();
  closeModal('detail-modal');
  renderDex();
  showToast('삭제했어요.');
}

// ─── PROFILE ─────────────────────────────────────────────
function renderProfile() {
  document.getElementById('st1').textContent = db.length;
  document.getElementById('st2').textContent = new Set(db.map(e=>e.category)).size;
  const weekAgo = Date.now()-7*86400000;
  document.getElementById('st3').textContent = db.filter(e=>e.timestamp>weekAgo).length;
  
  const total = CATEGORIES.reduce((a,c)=>a+c.total,0);
  const pct = db.length ? Math.round(db.length/total*100) : 0;
  document.getElementById('profile-sub').textContent = `전체 ${pct}% 완성 · ${db.length}종 발견`;

  document.getElementById('ach-list').innerHTML = ACHIEVEMENTS.map(a=>{
    const unlocked = a.req(db);
    return `<div class="achievement ${unlocked?'':'ach-locked'}">
      <div class="ach-icon">${a.icon}</div>
      <div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>
      ${unlocked?'<i class="ti ti-check" style="margin-left:auto;color:var(--green);font-size:18px;"></i>':''}
    </div>`;
  }).join('');
}

// ─── MODAL ───────────────────────────────────────────────
function showModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) closeModal(m.id); });
});

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('toast');
  if(!t) {
    t = document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#fff;color:#0f1117;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:opacity 0.3s;';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2200);
}

// ─── PWA ─────────────────────────────────────────────────
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ─── INIT ────────────────────────────────────────────────
renderHome();
</script>
