<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="일상도감">
<title>일상도감</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #101317;
    --panel: #171b21;
    --panel2: #202630;
    --line: rgba(255,255,255,.10);
    --line2: rgba(255,255,255,.16);
    --text: #f4f7fb;
    --muted: #a7b0bd;
    --dim: #657080;
    --green: #49d17c;
    --mint: #70e4be;
    --sky: #65b8ff;
    --amber: #f5bf4f;
    --rose: #ff7d9b;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  button, input, select, textarea { font: inherit; }
  button { -webkit-tap-highlight-color: transparent; }

  #app { height: 100vh; display: flex; flex-direction: column; }
  main { flex: 1; min-height: 0; overflow: hidden; position: relative; }
  .page { position: absolute; inset: 0; overflow-y: auto; display: none; padding: 18px 18px 24px; }
  .page.active { display: block; }

  .topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  h1, h2 { margin: 0; letter-spacing: 0; }
  h1 { font-size: 29px; line-height: 1.1; }
  h1 span { color: var(--green); }
  h2 { font-size: 22px; }
  .sub { color: var(--muted); font-size: 13px; line-height: 1.5; margin-top: 7px; }
  .count-pill { flex: 0 0 auto; border: 1px solid var(--line2); border-radius: 999px; padding: 8px 12px; color: var(--muted); font-size: 12px; background: rgba(255,255,255,.03); }

  .progress-wrap { margin: 14px 0 18px; }
  .progress-meta { display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 12px; margin-bottom: 7px; }
  .progress-track { height: 9px; border-radius: 999px; background: var(--panel2); overflow: hidden; border: 1px solid var(--line); }
  .progress-fill { height: 100%; width: 0%; border-radius: inherit; background: linear-gradient(90deg, var(--green), var(--sky)); transition: width .35s ease; }

  .feature {
    border: 1px solid var(--line);
    background: linear-gradient(135deg, rgba(73,209,124,.14), rgba(101,184,255,.10)), var(--panel);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 18px;
  }
  .feature-title { font-size: 16px; font-weight: 750; margin-bottom: 6px; }
  .feature p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.55; }

  .section-title { display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; margin: 20px 0 10px; }
  .category-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
  .category-chip {
    min-height: 58px;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 8px;
    color: var(--muted);
    display: grid;
    place-items: center;
    gap: 2px;
    padding: 8px 4px;
  }
  .category-chip strong { color: var(--text); font-size: 16px; }
  .category-chip span { font-size: 11px; }

  .dex-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .card {
    min-height: 182px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    overflow: hidden;
    position: relative;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    padding: 0;
  }
  .card:active { transform: scale(.985); }
  .card-top {
    height: 112px;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 50% 35%, rgba(255,255,255,.06), transparent 58%),
      var(--panel2);
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .card.found .card-top { background: linear-gradient(135deg, rgba(73,209,124,.18), rgba(245,191,79,.10)), var(--panel2); }
  .silhouette {
    width: 78px;
    height: 78px;
    color: #090b0f;
    opacity: .92;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.28));
  }
  .card.found .silhouette { color: var(--green); opacity: 1; }
  .number { position: absolute; top: 8px; left: 9px; color: var(--dim); font-size: 11px; font-weight: 800; }
  .state {
    position: absolute;
    top: 7px;
    right: 7px;
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 10px;
    font-weight: 800;
    color: #0e1410;
    background: var(--green);
  }
  .card:not(.found) .state { color: var(--muted); background: rgba(255,255,255,.08); }
  .card-body { padding: 11px 12px 13px; }
  .card-name { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
  .card:not(.found) .card-name { color: var(--muted); }
  .card-meta { color: var(--dim); font-size: 12px; line-height: 1.45; min-height: 34px; }

  .activity { display: grid; gap: 8px; }
  .activity-item { display: flex; gap: 10px; align-items: center; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 10px; }
  .activity-icon { width: 42px; height: 42px; border-radius: 8px; background: var(--panel2); display: grid; place-items: center; color: var(--green); }
  .activity-icon svg { width: 26px; height: 26px; }
  .activity-name { font-size: 14px; font-weight: 800; }
  .activity-date { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .empty { color: var(--dim); border: 1px dashed var(--line2); border-radius: 8px; padding: 22px; text-align: center; font-size: 13px; line-height: 1.5; }

  nav {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--line);
    background: rgba(23,27,33,.96);
    padding: 7px 8px calc(7px + var(--safe-bottom));
  }
  .nav-btn {
    border: 0;
    background: transparent;
    color: var(--dim);
    display: grid;
    gap: 3px;
    justify-items: center;
    padding: 7px 4px;
    font-size: 11px;
    cursor: pointer;
  }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn.active { color: var(--green); }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.62);
    display: none;
    align-items: flex-end;
    z-index: 30;
  }
  .modal.open { display: flex; }
  .sheet {
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    background: var(--panel);
    border-top: 1px solid var(--line2);
    border-radius: 8px 8px 0 0;
    padding: 18px;
    padding-bottom: calc(18px + var(--safe-bottom));
  }
  .grab { width: 38px; height: 4px; border-radius: 999px; background: var(--line2); margin: 0 auto 18px; }
  .detail-art { height: 168px; display: grid; place-items: center; border: 1px solid var(--line); background: var(--panel2); border-radius: 8px; margin-bottom: 14px; }
  .detail-art svg { width: 104px; height: 104px; color: var(--green); }
  .detail-kicker { color: var(--dim); font-size: 12px; font-weight: 800; margin-bottom: 4px; }
  .detail-title { font-size: 24px; font-weight: 850; margin-bottom: 8px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 14px; }
  .tag { border: 1px solid var(--line); background: var(--panel2); color: var(--muted); border-radius: 999px; padding: 5px 10px; font-size: 12px; }
  .desc { color: var(--muted); font-size: 14px; line-height: 1.65; margin: 0 0 16px; }
  .field { display: grid; gap: 7px; margin-bottom: 12px; }
  .field label { color: var(--muted); font-size: 12px; font-weight: 800; }
  .field input, .field textarea {
    width: 100%;
    border: 1px solid var(--line2);
    background: var(--panel2);
    color: var(--text);
    border-radius: 8px;
    padding: 12px;
    outline: none;
  }
  .field textarea { min-height: 78px; resize: vertical; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 14px; }
  .btn {
    border: 1px solid var(--line2);
    border-radius: 8px;
    padding: 13px 12px;
    background: var(--panel2);
    color: var(--text);
    font-weight: 800;
    cursor: pointer;
  }
  .btn.primary { background: var(--green); color: #07120b; border-color: var(--green); }
  .btn.danger { background: rgba(255,125,155,.13); color: var(--rose); border-color: rgba(255,125,155,.34); }
  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(82px + var(--safe-bottom));
    transform: translateX(-50%);
    background: #f7fbff;
    color: #101317;
    border-radius: 999px;
    padding: 10px 16px;
    font-weight: 850;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s ease, transform .22s ease;
    z-index: 40;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -8px); }

  @media (min-width: 720px) {
    body { display: grid; place-items: center; }
    #app { width: min(430px, 100vw); height: min(860px, 100vh); border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
  }
</style>
</head>
<body>
<div id="app">
  <main>
    <section class="page active" id="page-home">
      <div class="topbar">
        <div>
          <h1>일상<span>도감</span></h1>
          <div class="sub">집, 길가, 공원에서 발견한 사물과 생물을 하나씩 채우는 작은 도감</div>
        </div>
        <div class="count-pill" id="home-count">0 / 10</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta"><span>도감 완성도</span><strong id="progress-percent">0%</strong></div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <div class="feature">
        <div class="feature-title">오늘은 주변을 천천히 관찰해보세요.</div>
        <p>실루엣을 눌러 발견한 대상을 기록하면 잠겨 있던 항목이 밝게 채워집니다.</p>
      </div>

      <div class="section-title"><span>분류</span></div>
      <div class="category-row" id="category-row"></div>

      <div class="section-title"><span>최근 발견</span></div>
      <div class="activity" id="recent-list"></div>
    </section>

    <section class="page" id="page-dex">
      <div class="topbar">
        <div>
          <h2>실루엣 도감</h2>
          <div class="sub">대표적인 일상 대상 10개를 먼저 준비했어요.</div>
        </div>
        <div class="count-pill" id="dex-count">0 / 10</div>
      </div>
      <div class="dex-grid" id="dex-grid"></div>
    </section>

    <section class="page" id="page-notes">
      <div class="topbar">
        <div>
          <h2>발견 기록</h2>
          <div class="sub">도감에 채운 항목과 메모를 모아봅니다.</div>
        </div>
      </div>
      <div class="activity" id="all-records"></div>
    </section>
  </main>

  <nav>
    <button class="nav-btn active" data-page="home" aria-label="홈">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/><path d="M9 20v-6h6v6"/></svg>
      홈
    </button>
    <button class="nav-btn" data-page="dex" aria-label="도감">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3z"/><path d="M8 4v16"/><path d="M11 8h5"/></svg>
      도감
    </button>
    <button class="nav-btn" data-page="notes" aria-label="기록">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4h10l2 2v14H5V4z"/><path d="M9 10h6"/><path d="M9 14h6"/><path d="M9 18h3"/></svg>
      기록
    </button>
  </nav>
</div>

<div class="modal" id="detail-modal">
  <div class="sheet">
    <div class="grab"></div>
    <div id="detail-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SVG = {
  cup: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M20 18h32l-4 39a7 7 0 0 1-7 6H31a7 7 0 0 1-7-6L20 18Zm33 7h7a9 9 0 0 1 0 18h-9l1-8h8a1 1 0 0 0 0-2h-7V25Z"/></svg>',
  key: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M29 48a17 17 0 1 1 13-28 17 17 0 0 1-1 23l22 22-8 8-6-6-5 5-7-7 5-5-8-8a17 17 0 0 1-5 1Zm0-22a5 5 0 1 0 0 10 5 5 0 0 0 0-10Z"/></svg>',
  book: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M16 13h36a10 10 0 0 1 10 10v45H25a9 9 0 0 1-9-9V13Zm10 42a4 4 0 0 0 0 8h28v-8H26Zm2-28h22v7H28v-7Zm0 13h18v7H28v-7Z"/></svg>',
  cat: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M21 29 18 13l15 8a25 25 0 0 1 14 0l15-8-3 16a22 22 0 0 1 5 14c0 16-11 25-24 25S16 59 16 43a22 22 0 0 1 5-14Zm12 18 7 6 7-6H33Z"/></svg>',
  dog: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M21 21c7-7 16 1 19 5 3-4 12-12 19-5 5 5 3 17-2 24v9a14 14 0 0 1-14 14h-6a14 14 0 0 1-14-14v-9c-5-7-7-19-2-24Zm12 27 7 7 7-7H33Z"/></svg>',
  butterfly: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M40 35c-8-19-24-25-32-15-8 11 1 27 22 28-16 7-18 21-9 26 8 4 18-4 19-20 1 16 11 24 19 20 9-5 7-19-9-26 21-1 30-17 22-28-8-10-24-4-32 15Z"/></svg>',
  leaf: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M69 11C34 12 16 27 17 50c1 10 8 18 18 19 21 2 36-22 34-58ZM19 66c13-13 27-25 45-39-13 15-27 29-41 42l-4-3Z"/></svg>',
  flower: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M40 31c-3-18-22-21-24-7-1 8 6 13 15 15-14 8-11 26 2 25 7-1 10-8 10-18 8 15 26 11 25-2-1-8-8-11-18-9 12-12 3-27-10-19-4 3-4 9 0 15Zm0 6a7 7 0 1 1 0 14 7 7 0 0 1 0-14Z"/></svg>',
  mushroom: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M10 42c1-19 15-31 30-31s29 12 30 31H10Zm23 5h14l4 24H29l4-24Z"/></svg>',
  apple: '<svg class="silhouette" viewBox="0 0 80 80" fill="currentColor"><path d="M47 18c-4 3-8 4-13 3 2-9 7-13 17-13 0 4-1 7-4 10Zm-7 10c9-8 28-4 31 13 3 19-11 32-21 31-4 0-7-3-10-3s-6 3-10 3C20 73 6 60 9 41c3-17 22-21 31-13Z"/></svg>'
};

const CATALOG = [
  { id: 'cup', name: '컵', category: '사물', hint: '부엌이나 책상 위에서 자주 보여요.', desc: '물을 마시거나 작은 물건을 담을 때 쓰는 가장 가까운 생활 도구입니다.', tags: ['생활용품', '주방', '매일 봄'] },
  { id: 'key', name: '열쇠', category: '사물', hint: '문을 열 때 손에 쥐는 작은 도구예요.', desc: '잠긴 공간을 열어주는 도구입니다. 주머니나 가방 속에서 자주 발견됩니다.', tags: ['도구', '금속', '외출'] },
  { id: 'book', name: '책', category: '사물', hint: '종이가 여러 장 묶여 있고 이야기가 들어 있어요.', desc: '지식과 이야기를 담은 물건입니다. 표지, 종이 냄새, 책갈피가 단서가 됩니다.', tags: ['기록', '종이', '읽기'] },
  { id: 'cat', name: '고양이', category: '동물', hint: '조용히 걷고 높은 곳을 좋아해요.', desc: '도시와 집 주변에서 만날 수 있는 동물입니다. 귀, 수염, 긴 꼬리가 큰 특징입니다.', tags: ['동물', '반려', '골목'] },
  { id: 'dog', name: '강아지', category: '동물', hint: '산책길에서 자주 만나고 사람을 잘 따라요.', desc: '사람과 가까이 지내는 동물입니다. 품종마다 크기와 털 모양이 아주 다양합니다.', tags: ['동물', '반려', '산책'] },
  { id: 'butterfly', name: '나비', category: '곤충', hint: '꽃 주변에서 날개를 접었다 폈다 해요.', desc: '화려한 날개를 가진 곤충입니다. 꽃가루를 옮기며 식물의 번식을 돕기도 합니다.', tags: ['곤충', '날개', '꽃'] },
  { id: 'leaf', name: '나뭇잎', category: '식물', hint: '초록색이 많고 나무나 화분에서 보여요.', desc: '식물이 빛을 받아 에너지를 만드는 부분입니다. 모양과 잎맥이 관찰 포인트입니다.', tags: ['식물', '초록', '잎맥'] },
  { id: 'flower', name: '꽃', category: '식물', hint: '색과 향으로 눈에 잘 띄어요.', desc: '식물의 번식 기관입니다. 색, 꽃잎 수, 향기로 여러 종류를 구분할 수 있습니다.', tags: ['식물', '색', '향기'] },
  { id: 'mushroom', name: '버섯', category: '식물', hint: '비 온 뒤 그늘진 곳에서 보일 때가 있어요.', desc: '균류에 속하는 생물입니다. 갓과 대의 모양이 다양하고 함부로 먹으면 안 됩니다.', tags: ['균류', '그늘', '비 온 뒤'] },
  { id: 'apple', name: '사과', category: '먹거리', hint: '둥글고 달콤한 과일이에요.', desc: '일상에서 흔히 먹는 과일입니다. 색은 빨강, 초록, 노랑 등으로 다양합니다.', tags: ['과일', '먹거리', '간식'] }
];

let records = JSON.parse(localStorage.getItem('daily-dex-records') || '{}');
let activeItem = null;

function isFound(id) {
  return Boolean(records[id]);
}

function foundCount() {
  return CATALOG.filter(item => isFound(item.id)).length;
}

function render() {
  renderProgress();
  renderCategories();
  renderDex();
  renderLists();
}

function renderProgress() {
  const count = foundCount();
  const pct = Math.round(count / CATALOG.length * 100);
  document.getElementById('home-count').textContent = `${count} / ${CATALOG.length}`;
  document.getElementById('dex-count').textContent = `${count} / ${CATALOG.length}`;
  document.getElementById('progress-percent').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
}

function renderCategories() {
  const categories = [...new Set(CATALOG.map(item => item.category))];
  document.getElementById('category-row').innerHTML = categories.map(cat => {
    const total = CATALOG.filter(item => item.category === cat).length;
    const done = CATALOG.filter(item => item.category === cat && isFound(item.id)).length;
    return `<div class="category-chip"><strong>${done}/${total}</strong><span>${cat}</span></div>`;
  }).join('');
}

function renderDex() {
  document.getElementById('dex-grid').innerHTML = CATALOG.map((item, index) => {
    const found = isFound(item.id);
    const note = records[item.id]?.note || item.hint;
    return `<button class="card ${found ? 'found' : ''}" onclick="openDetail('${item.id}')">
      <div class="card-top">
        <span class="number">#${String(index + 1).padStart(3, '0')}</span>
        <span class="state">${found ? '발견' : '미발견'}</span>
        ${SVG[item.id]}
      </div>
      <div class="card-body">
        <div class="card-name">${found ? item.name : '???'}</div>
        <div class="card-meta">${found ? note : item.hint}</div>
      </div>
    </button>`;
  }).join('');
}

function renderLists() {
  const found = CATALOG
    .filter(item => isFound(item.id))
    .sort((a, b) => records[b.id].time - records[a.id].time);

  const html = found.length ? found.map(item => recordHtml(item)).join('') : '<div class="empty">아직 발견한 항목이 없어요.<br>도감에서 실루엣을 눌러 첫 항목을 채워보세요.</div>';
  document.getElementById('recent-list').innerHTML = found.slice(0, 3).length ? found.slice(0, 3).map(item => recordHtml(item)).join('') : html;
  document.getElementById('all-records').innerHTML = html;
}

function recordHtml(item) {
  const date = new Date(records[item.id].time).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  return `<div class="activity-item" onclick="openDetail('${item.id}')">
    <div class="activity-icon">${SVG[item.id].replace('class="silhouette"', '')}</div>
    <div>
      <div class="activity-name">${item.name}</div>
      <div class="activity-date">${date} 발견 · ${records[item.id].place || '장소 미기록'}</div>
    </div>
  </div>`;
}

function openDetail(id) {
  activeItem = CATALOG.find(item => item.id === id);
  const record = records[id];
  const found = Boolean(record);
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-art">${SVG[id]}</div>
    <div class="detail-kicker">#${String(CATALOG.indexOf(activeItem) + 1).padStart(3, '0')} · ${activeItem.category}</div>
    <div class="detail-title">${found ? activeItem.name : '미발견 실루엣'}</div>
    <p class="desc">${found ? activeItem.desc : activeItem.hint}</p>
    <div class="tags">${activeItem.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
    ${found ? foundForm(record) : discoverForm()}
  `;
  document.getElementById('detail-modal').classList.add('open');
}

function discoverForm() {
  return `
    <div class="field">
      <label for="place">발견한 곳</label>
      <input id="place" placeholder="예: 책상 위, 공원 산책길">
    </div>
    <div class="field">
      <label for="note">관찰 메모</label>
      <textarea id="note" placeholder="색, 크기, 냄새, 움직임 같은 특징을 적어보세요."></textarea>
    </div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">닫기</button>
      <button class="btn primary" onclick="saveDiscovery()">도감에 추가</button>
    </div>`;
}

function foundForm(record) {
  const date = new Date(record.time).toLocaleString('ko-KR');
  return `
    <div class="field">
      <label>발견 일시</label>
      <input value="${date}" readonly>
    </div>
    <div class="field">
      <label for="place">발견한 곳</label>
      <input id="place" value="${escapeHtml(record.place || '')}">
    </div>
    <div class="field">
      <label for="note">관찰 메모</label>
      <textarea id="note">${escapeHtml(record.note || '')}</textarea>
    </div>
    <div class="actions">
      <button class="btn danger" onclick="deleteDiscovery()">기록 삭제</button>
      <button class="btn primary" onclick="saveDiscovery()">수정 저장</button>
    </div>`;
}

function saveDiscovery() {
  const place = document.getElementById('place').value.trim();
  const note = document.getElementById('note').value.trim();
  const previous = records[activeItem.id];
  records[activeItem.id] = {
    place,
    note,
    time: previous?.time || Date.now()
  };
  localStorage.setItem('daily-dex-records', JSON.stringify(records));
  closeModal();
  render();
  toast(`${activeItem.name} 기록을 저장했어요`);
}

function deleteDiscovery() {
  if (!confirm('이 발견 기록을 삭제할까요?')) return;
  delete records[activeItem.id];
  localStorage.setItem('daily-dex-records', JSON.stringify(records));
  closeModal();
  render();
  toast('기록을 삭제했어요');
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

function toast(message) {
  const el = document.getElementById('toast');
  el.textContent = message;
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  }[char]));
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
  });
});

document.getElementById('detail-modal').addEventListener('click', event => {
  if (event.target.id === 'detail-modal') closeModal();
});

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

render();
</script>
</body>
</html>
