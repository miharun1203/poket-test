<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="신비한동물사전">
<title>신비한동물사전</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0d1117;--panel:#161b22;--panel2:#1c2333;--line:rgba(255,255,255,.1);
  --text:#e6edf3;--muted:#8b949e;--dim:#484f58;
  --gold:#f5bf4f;--violet:#b49cff;--rose:#ff7d9b;--sky:#58a6ff;--green:#3fb950;
  --safe:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard",sans-serif;background:#070a0f;color:var(--text)}
button,input,textarea{font:inherit}button{cursor:pointer;-webkit-tap-highlight-color:transparent}
#app{height:100vh;display:flex;flex-direction:column;background:var(--bg)}
main{flex:1;min-height:0;position:relative;overflow:hidden}
.page{position:absolute;inset:0;display:none;overflow:auto;padding:16px 16px 24px}.page.active{display:block}
h1,h2{margin:0;letter-spacing:-.5px}
h1{font-size:26px;font-weight:900;line-height:1.1}
h1 em{font-style:normal;color:var(--gold)}
h2{font-size:20px;font-weight:800}
.sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.5}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}

/* 버튼 */
.btn{border:1px solid var(--line);border-radius:8px;padding:12px;background:var(--panel2);color:var(--text);font-weight:700;text-align:center;transition:.15s;display:block;width:100%}
.btn.primary{background:var(--gold);color:#0d0a00;border-color:var(--gold)}
.btn.ghost{background:transparent;color:var(--muted)}
.btn.danger{background:rgba(255,125,155,.1);color:var(--rose);border-color:rgba(255,125,155,.3)}
.btn:active{transform:scale(.97)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.actions.three{grid-template-columns:1fr 1fr 1fr}
.actions.solo{grid-template-columns:1fr}

/* 홈 */
.hero{background:linear-gradient(135deg,rgba(245,191,79,.15),rgba(180,156,255,.08)),var(--panel);border:1px solid rgba(245,191,79,.25);border-radius:12px;padding:16px;margin-bottom:14px}
.hero-title{font-size:15px;font-weight:800;margin-bottom:6px;color:var(--gold)}
.hero p{margin:0;color:var(--muted);font-size:13px;line-height:1.6}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
.stat strong{display:block;font-size:22px;font-weight:900;color:var(--gold)}
.stat span{color:var(--muted);font-size:11px}
.section-label{color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;margin:16px 0 8px}

/* 피드 카드 */
.feed{display:grid;gap:10px}
.feed-card{border:1px solid var(--line);background:var(--panel);border-radius:12px;overflow:hidden;transition:.15s}
.feed-card:active{transform:scale(.99)}
.feed-thumb{width:100%;height:200px;object-fit:cover;display:block;background:var(--panel2)}
.feed-thumb-placeholder{width:100%;height:200px;background:var(--panel2);display:grid;place-items:center;color:var(--dim);font-size:40px}
.feed-body{padding:12px}
.feed-animal{font-size:18px;font-weight:900;margin-bottom:2px}
.feed-sub{color:var(--muted);font-size:12px;margin-bottom:8px}
.feed-desc{color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:10px}
.feed-meta{display:flex;align-items:center;justify-content:space-between}
.feed-author{color:var(--dim);font-size:12px}
.like-btn{display:flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--panel2);border-radius:999px;padding:6px 12px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.like-btn.liked{background:rgba(255,125,155,.15);border-color:rgba(255,125,155,.4);color:var(--rose)}
.like-btn:active{transform:scale(.93)}
.like-heart{font-size:15px}
.feed-rank{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;border-radius:999px;padding:3px 8px;margin-bottom:8px}
.feed-rank.r1{background:rgba(245,191,79,.2);color:var(--gold)}
.feed-rank.r2{background:rgba(180,156,255,.2);color:var(--violet)}
.feed-rank.r3{background:rgba(88,166,255,.2);color:var(--sky)}
.feed-rank.rn{background:rgba(255,255,255,.07);color:var(--muted)}

/* 촬영 */
.camera-wrap{min-height:280px;border:1px solid var(--line);background:#050810;border-radius:12px;overflow:hidden;display:grid;place-items:center;position:relative}
#camera,#preview{width:100%;height:280px;object-fit:cover;display:none;position:absolute;inset:0}
.emptycam{display:grid;gap:10px;justify-items:center;padding:30px 18px;position:relative;z-index:1}
.emptycam-icon{font-size:48px}
.emptycam p{color:var(--muted);font-size:13px;text-align:center;margin:0}
#file{display:none}
canvas{display:none}

/* AI 결과 */
.ai-result{border:1px solid rgba(245,191,79,.35);background:rgba(245,191,79,.07);border-radius:10px;padding:14px;margin-top:12px}
.ai-animal-name{font-size:22px;font-weight:900;color:var(--gold);margin-bottom:4px}
.ai-desc{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:12px}
.ai-conf{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ai-conf-bar{flex:1;height:6px;background:var(--panel2);border-radius:999px;overflow:hidden}
.ai-conf-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--rose));border-radius:999px;transition:width .5s}
.ai-conf-pct{font-size:12px;font-weight:800;color:var(--gold)}
.scan-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px}
.scanner{width:48px;height:48px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-text{color:var(--muted);font-size:13px}

/* 랭킹 */
.rank-list{display:grid;gap:8px}
.rank-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:10px 12px;cursor:pointer;transition:.15s}
.rank-row:active{transform:scale(.99)}
.rank-num{font-size:20px;font-weight:900;min-width:28px;text-align:center}
.rank-num.r1{color:var(--gold)}.rank-num.r2{color:var(--violet)}.rank-num.r3{color:var(--sky)}.rank-num.rn{color:var(--dim)}
.rank-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--panel2);flex:0 0 52px}
.rank-thumb-placeholder{width:52px;height:52px;border-radius:8px;background:var(--panel2);display:grid;place-items:center;font-size:24px;flex:0 0 52px}
.rank-info{flex:1;min-width:0}
.rank-animal{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-author{font-size:12px;color:var(--dim)}
.rank-likes{display:flex;align-items:center;gap:4px;color:var(--rose);font-size:14px;font-weight:800}

/* 모달 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;z-index:30}
.modal.open{display:flex}
.sheet{width:100%;max-height:92vh;overflow:auto;background:var(--panel);border-top:1px solid var(--line);border-radius:14px 14px 0 0;padding:16px;padding-bottom:calc(16px + var(--safe))}
.grab{width:36px;height:4px;border-radius:999px;background:var(--line);margin:0 auto 16px}
.modal-img{width:100%;height:200px;object-fit:cover;border-radius:10px;margin-bottom:12px;display:block;background:var(--panel2)}
.modal-placeholder{width:100%;height:200px;border-radius:10px;margin-bottom:12px;background:var(--panel2);display:grid;place-items:center;font-size:60px}
.modal-animal{font-size:24px;font-weight:900;margin-bottom:4px}
.modal-sub{color:var(--muted);font-size:13px;margin-bottom:12px}
.modal-desc{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:14px;background:var(--panel2);border-radius:8px;padding:12px}
.field{display:grid;gap:6px;margin-bottom:10px}
.field label{color:var(--muted);font-size:12px;font-weight:800}
.field input,.field textarea{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:8px;padding:11px;outline:none;font-size:14px}
.field textarea{min-height:72px;resize:vertical}
.field input:focus,.field textarea:focus{border-color:rgba(245,191,79,.5)}

/* 내 업로드 */
.my-list{display:grid;gap:8px}
.my-card{display:flex;gap:10px;align-items:center;border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:10px}
.my-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--panel2);flex:0 0 52px}
.my-thumb-ph{width:52px;height:52px;border-radius:8px;background:var(--panel2);display:grid;place-items:center;font-size:24px;flex:0 0 52px}
.my-info{flex:1}
.my-animal{font-size:14px;font-weight:800}
.my-meta{font-size:12px;color:var(--dim)}
.my-likes{color:var(--rose);font-size:13px;font-weight:700}
.empty{color:var(--dim);border:1px dashed var(--line);border-radius:10px;padding:24px;text-align:center;font-size:13px;line-height:1.6}

/* 네비 */
nav{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line);background:rgba(22,27,34,.97);padding:6px 8px calc(6px + var(--safe))}
.nav{border:0;background:transparent;color:var(--dim);display:grid;gap:2px;justify-items:center;padding:7px 4px;font-size:10px;font-weight:600}
.nav.active{color:var(--gold)}.nav svg{width:22px;height:22px}

/* 토스트 */
.toast{position:fixed;left:50%;bottom:calc(80px + var(--safe));transform:translateX(-50%);background:#f7fbff;color:#0d1117;border-radius:999px;padding:9px 16px;font-weight:800;font-size:13px;opacity:0;pointer-events:none;transition:.22s;z-index:40;white-space:nowrap}
.toast.show{opacity:1;transform:translate(-50%,-8px)}

/* 로딩 오버레이 */
.loading-overlay{position:fixed;inset:0;background:rgba(13,17,23,.85);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading-overlay.show{display:flex}
.loading-overlay .scanner{width:56px;height:56px}
.loading-overlay p{color:var(--muted);font-size:14px}

@media(min-width:720px){body{display:grid;place-items:center;background:#070a0f}#app{width:min(430px,100vw);height:min(880px,100vh);border-left:1px solid var(--line);border-right:1px solid var(--line)}}
</style>
</head>
<body>
<div id="app">
<main>

<!-- 홈/피드 -->
<section class="page active" id="page-home">
  <div class="top">
    <div><h1>신비한<em>동물사전</em></h1><div class="sub">세상 모든 것이 동물이 될 수 있다 — 찍고, 올리고, 겨뤄라</div></div>
  </div>
  <div class="stat-row" id="stat-row">
    <div class="stat"><strong id="stat-total">0</strong><span>전체</span></div>
    <div class="stat"><strong id="stat-today">0</strong><span>오늘</span></div>
    <div class="stat"><strong id="stat-mine">0</strong><span>내 등록</span></div>
  </div>
  <div class="hero">
    <div class="hero-title">🌟 이번 주 챔피언</div>
    <div id="champion-area"><span style="color:var(--dim);font-size:13px">아직 등록된 동물이 없어요. 첫 번째 주인공이 되어보세요!</span></div>
  </div>
  <div class="section-label">최신 피드</div>
  <div class="feed" id="feed-list"></div>
</section>

<!-- 촬영·등록 -->
<section class="page" id="page-capture">
  <div class="top"><div><h2>📷 동물 찾기</h2><div class="sub">무엇이든 동물로 만들어 보세요. AI가 이름을 붙여드려요.</div></div></div>
  <div class="camera-wrap" id="cam-wrap">
    <video id="camera" autoplay playsinline muted></video>
    <img id="preview" alt="">
    <div class="emptycam" id="cam-empty">
      <div class="emptycam-icon">🦄</div>
      <p>카메라로 찍거나 사진을 선택해<br>AI 동물 감정을 받아보세요</p>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <input id="file" type="file" accept="image/*" onchange="handleFile(event)">
  <div class="actions three" style="margin-top:10px">
    <button class="btn" onclick="startCamera()">📷 카메라</button>
    <button class="btn primary" onclick="takePhoto()">셔터</button>
    <label class="btn" for="file">🖼 갤러리</label>
  </div>
  <div class="actions">
    <button class="btn ghost" onclick="switchCamera()">🔄 전환</button>
    <button class="btn primary" id="ai-btn" onclick="runAI()" style="display:none">✦ AI 감정</button>
  </div>
  <div id="ai-area"></div>
</section>

<!-- 랭킹 -->
<section class="page" id="page-rank">
  <div class="top"><div><h2>🏆 랭킹</h2><div class="sub">좋아요 수로 결정되는 진짜 챔피언</div></div></div>
  <div class="rank-list" id="rank-list"></div>
</section>

<!-- 내 기록 -->
<section class="page" id="page-my">
  <div class="top"><div><h2>내 동물사전</h2><div class="sub">내가 등록한 동물들</div></div></div>
  <div class="my-list" id="my-list"></div>
</section>

</main>
<nav>
  <button class="nav active" data-page="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/><path d="M9 20v-6h6v6"/></svg>피드
  </button>
  <button class="nav" data-page="capture">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8h4l2-3h4l2 3h4v12H4z"/><circle cx="12" cy="14" r="4"/></svg>촬영
  </button>
  <button class="nav" data-page="rank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v4a5 5 0 0 1-10 0z"/><path d="M5 5H3v2a4 4 0 0 0 4 4"/><path d="M19 5h2v2a4 4 0 0 1-4 4"/></svg>랭킹
  </button>
  <button class="nav" data-page="my">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>내기록
  </button>
</nav>
</div>

<!-- 상세 모달 -->
<div class="modal" id="detail-modal"><div class="sheet"><div class="grab"></div><div id="detail-body"></div></div></div>

<!-- 로딩 -->
<div class="loading-overlay" id="loading"><div class="scanner"></div><p id="loading-text">AI가 동물을 감정하는 중...</p></div>

<div class="toast" id="toast"></div>

<script type="module">
// ── Firebase ─────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set, get, update, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEfMYLyw6eaIIW65Rj3u5wmntSNLwzWg",
  authDomain: "fantastic-beasts-10d8f.firebaseapp.com",
  databaseURL: "https://fantastic-beasts-10d8f-default-rtdb.firebaseio.com",
  projectId: "fantastic-beasts-10d8f",
  storageBucket: "fantastic-beasts-10d8f.firebasestorage.app",
  messagingSenderId: "325457570318",
  appId: "1:325457570318:web:f6b93f27391f0f347daa5f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 유저 ID (익명 고유 ID) ────────────────────────────────────
let myId = localStorage.getItem('shinbi-uid');
if(!myId){ myId = 'u_'+Math.random().toString(36).slice(2,10); localStorage.setItem('shinbi-uid',myId); }
let myLikes = JSON.parse(localStorage.getItem('shinbi-likes')||'{}');

// ── 상태 ─────────────────────────────────────────────────────
let shot='', stream=null, facing='environment', aiData=null;
let allPosts=[];

const $=id=>document.getElementById(id);
const esc=v=>String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));

// ── Firebase 리스너 ───────────────────────────────────────────
const postsRef = ref(db, 'posts');
onValue(postsRef, snap => {
  allPosts = [];
  snap.forEach(child => {
    allPosts.push({ id: child.key, ...child.val() });
  });
  allPosts.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  renderAll();
});

function renderAll(){
  renderStats();
  renderChampion();
  renderFeed();
  renderRank();
  renderMy();
}

// ── 통계 ─────────────────────────────────────────────────────
function renderStats(){
  const today = new Date().toDateString();
  const todayPosts = allPosts.filter(p=>new Date(p.createdAt).toDateString()===today);
  const myPosts = allPosts.filter(p=>p.uid===myId);
  $('stat-total').textContent = allPosts.length;
  $('stat-today').textContent = todayPosts.length;
  $('stat-mine').textContent = myPosts.length;
}

// ── 챔피언 ───────────────────────────────────────────────────
function renderChampion(){
  if(!allPosts.length) return;
  const top = [...allPosts].sort((a,b)=>(b.likes||0)-(a.likes||0))[0];
  $('champion-area').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      ${top.imageData?`<img src="${top.imageData}" style="width:52px;height:52px;border-radius:8px;object-fit:cover">`:
        `<div style="width:52px;height:52px;border-radius:8px;background:var(--panel2);display:grid;place-items:center;font-size:26px">${top.emoji||'🦎'}</div>`}
      <div>
        <div style="font-size:16px;font-weight:900;color:var(--gold)">${esc(top.animalName)}</div>
        <div style="font-size:12px;color:var(--muted)">by ${esc(top.author||'익명')} · ❤️ ${top.likes||0}</div>
      </div>
    </div>`;
}

// ── 피드 ─────────────────────────────────────────────────────
function renderFeed(){
  const el = $('feed-list');
  if(!allPosts.length){
    el.innerHTML=`<div class="empty">아직 등록된 동물이 없어요 🌿<br>첫 번째 동물을 등록해보세요!</div>`;return;
  }
  const sorted = [...allPosts].sort((a,b)=>(b.likes||0)-(a.likes||0));
  const rankMap = {};
  sorted.forEach((p,i)=>rankMap[p.id]=i+1);
  el.innerHTML = allPosts.map(p=>feedCard(p, rankMap[p.id])).join('');
}

function rankBadge(n){
  if(n===1) return `<div class="feed-rank r1">🥇 1위</div>`;
  if(n===2) return `<div class="feed-rank r2">🥈 2위</div>`;
  if(n===3) return `<div class="feed-rank r3">🥉 3위</div>`;
  return `<div class="feed-rank rn">${n}위</div>`;
}

function feedCard(p, rank){
  const liked = !!myLikes[p.id];
  return `<div class="feed-card" onclick="openDetail('${p.id}')">
    ${p.imageData?`<img class="feed-thumb" src="${p.imageData}" alt="${esc(p.animalName)}" loading="lazy" onclick="event.stopPropagation()">`:
      `<div class="feed-thumb-placeholder">${p.emoji||'🦎'}</div>`}
    <div class="feed-body">
      ${rankBadge(rank)}
      <div class="feed-animal">${esc(p.animalName)}</div>
      <div class="feed-sub">${esc(p.scientificName||'')}</div>
      <div class="feed-desc">${esc((p.desc||'').slice(0,80))}${(p.desc||'').length>80?'…':''}</div>
      <div class="feed-meta">
        <div class="feed-author">by ${esc(p.author||'익명')}</div>
        <button class="like-btn ${liked?'liked':''}" onclick="event.stopPropagation();toggleLike('${p.id}')">
          <span class="like-heart">${liked?'❤️':'🤍'}</span> ${p.likes||0}
        </button>
      </div>
    </div>
  </div>`;
}

// ── 랭킹 ─────────────────────────────────────────────────────
function renderRank(){
  const el = $('rank-list');
  if(!allPosts.length){el.innerHTML=`<div class="empty">아직 없어요 🏆<br>등록하면 자동으로 랭킹에 올라가요!</div>`;return;}
  const sorted = [...allPosts].sort((a,b)=>(b.likes||0)-(a.likes||0));
  el.innerHTML = sorted.map((p,i)=>{
    const n=i+1;
    const nc=n===1?'r1':n===2?'r2':n===3?'r3':'rn';
    return `<div class="rank-row" onclick="openDetail('${p.id}')">
      <div class="rank-num ${nc}">${n===1?'🥇':n===2?'🥈':n===3?'🥉':n}</div>
      ${p.imageData?`<img class="rank-thumb" src="${p.imageData}" alt="">`:
        `<div class="rank-thumb-placeholder">${p.emoji||'🦎'}</div>`}
      <div class="rank-info">
        <div class="rank-animal">${esc(p.animalName)}</div>
        <div class="rank-author">by ${esc(p.author||'익명')}</div>
      </div>
      <div class="rank-likes">❤️ ${p.likes||0}</div>
    </div>`;
  }).join('');
}

// ── 내 기록 ──────────────────────────────────────────────────
function renderMy(){
  const el = $('my-list');
  const myPosts = allPosts.filter(p=>p.uid===myId);
  if(!myPosts.length){el.innerHTML=`<div class="empty">아직 등록한 동물이 없어요 🐾<br>촬영 탭에서 첫 동물을 등록해보세요!</div>`;return;}
  el.innerHTML = myPosts.map(p=>`
    <div class="my-card" onclick="openDetail('${p.id}')">
      ${p.imageData?`<img class="my-thumb" src="${p.imageData}" alt="">`:
        `<div class="my-thumb-ph">${p.emoji||'🦎'}</div>`}
      <div class="my-info">
        <div class="my-animal">${esc(p.animalName)}</div>
        <div class="my-meta">${new Date(p.createdAt).toLocaleDateString('ko-KR')}</div>
      </div>
      <div class="my-likes">❤️ ${p.likes||0}</div>
    </div>`).join('');
}

// ── 좋아요 ───────────────────────────────────────────────────
window.toggleLike = async function(postId){
  const liked = !!myLikes[postId];
  const postRef = ref(db, `posts/${postId}`);
  const snap = await get(postRef);
  if(!snap.exists()) return;
  const cur = snap.val().likes||0;
  if(liked){
    myLikes[postId]=false;
    await update(postRef, {likes: Math.max(0,cur-1)});
  } else {
    myLikes[postId]=true;
    await update(postRef, {likes: cur+1});
  }
  localStorage.setItem('shinbi-likes', JSON.stringify(myLikes));
}

// ── 카메라 ───────────────────────────────────────────────────
window.startCamera = async function(){
  try{
    if(stream){stream.getTracks().forEach(t=>t.stop());}
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:facing},audio:false});
    const cam=$('camera'); cam.srcObject=stream; cam.style.display='block';
    $('cam-empty').style.display='none';
    $('preview').style.display='none';
    $('ai-btn').style.display='block';
  }catch(e){toast('카메라 권한을 허용해주세요');}
}
window.switchCamera = function(){
  facing=facing==='environment'?'user':'environment';
  if(stream) startCamera();
}
window.takePhoto = function(){
  const cam=$('camera');
  if(cam.style.display==='none'){toast('먼저 카메라를 켜주세요');return;}
  const cv=$('canvas'); cv.width=cam.videoWidth; cv.height=cam.videoHeight;
  cv.getContext('2d').drawImage(cam,0,0);
  shot=cv.toDataURL('image/jpeg',0.82);
  const pr=$('preview'); pr.src=shot; pr.style.display='block';
  cam.style.display='none';
  stopCamera();
  $('ai-btn').style.display='block';
  $('ai-area').innerHTML='';
  aiData=null;
}
window.handleFile = function(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    shot=ev.target.result;
    const pr=$('preview'); pr.src=shot; pr.style.display='block';
    $('camera').style.display='none';
    $('cam-empty').style.display='none';
    $('ai-btn').style.display='block';
    $('ai-area').innerHTML='';
    aiData=null;
  };
  r.readAsDataURL(f);
}
function stopCamera(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
}

// ── AI 감정 ──────────────────────────────────────────────────
window.runAI = async function(){
  if(!shot){toast('사진을 먼저 찍어주세요');return;}
  showLoading('AI가 동물을 감정하는 중...');
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:`당신은 세상 모든 것에서 동물을 찾아내는 신비한동물사전의 AI 감정사입니다.
사진을 보고 무엇이 찍혀있든 반드시 동물 이름을 붙여주세요.
사람이 동물 흉내를 내도, 사물이 동물처럼 보여도, 어떤 것이든 동물로 인정합니다.
반드시 다음 JSON 형식으로만 답하세요(다른 텍스트 없이):
{
  "animalName": "동물 이름 (한국어, 창의적으로)",
  "scientificName": "학명 또는 별칭 (있으면 영어, 없으면 창작)",
  "emoji": "대표 이모지 1개",
  "desc": "이 동물에 대한 재미있는 설명 2~3문장. 진짜 동물이든 창작 동물이든 진지하게 설명",
  "confidence": 88
}`,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:shot.split(',')[1]}},
          {type:'text',text:'이 사진에서 동물을 감정해주세요.'}
        ]}]
      })
    });
    const data = await resp.json();
    const raw = data.content[0].text;
    const clean = raw.replace(/```json|```/g,'').trim();
    aiData = JSON.parse(clean);
    hideLoading();
    renderAIResult();
  }catch(e){
    hideLoading();
    $('ai-area').innerHTML=`<div style="color:var(--rose);padding:14px;text-align:center;font-size:13px">AI 감정 실패. 다시 시도해주세요.<br><small>${e.message}</small></div>`;
  }
}

function renderAIResult(){
  if(!aiData) return;
  $('ai-area').innerHTML=`
    <div class="ai-result">
      <div class="ai-animal-name">${aiData.emoji} ${esc(aiData.animalName)}</div>
      <div style="color:var(--muted);font-size:12px;margin-bottom:8px;font-style:italic">${esc(aiData.scientificName||'')}</div>
      <div class="ai-conf">
        <div class="ai-conf-bar"><div class="ai-conf-fill" style="width:${aiData.confidence}%"></div></div>
        <div class="ai-conf-pct">${aiData.confidence}%</div>
      </div>
      <div class="ai-desc">${esc(aiData.desc)}</div>
      <button class="btn primary" onclick="openRegister()">🏷️ 이 동물 등록하기</button>
    </div>`;
}

// ── 등록 모달 ─────────────────────────────────────────────────
window.openRegister = function(){
  if(!aiData){toast('먼저 AI 감정을 받아주세요');return;}
  $('detail-body').innerHTML=`
    <div class="modal-animal">${aiData.emoji} ${esc(aiData.animalName)}</div>
    <div class="modal-sub">${esc(aiData.scientificName||'')} · AI 신뢰도 ${aiData.confidence}%</div>
    <div class="modal-desc">${esc(aiData.desc)}</div>
    <div class="field"><label>닉네임 (선택)</label><input id="r-author" placeholder="익명" maxlength="20"></div>
    <div class="field"><label>발견 장소 (선택)</label><input id="r-place" placeholder="예: 회사 4층 복도" maxlength="40"></div>
    <div class="field"><label>관찰 메모 (선택)</label><textarea id="r-note" placeholder="이 동물에 대한 한마디..." maxlength="200"></textarea></div>
    <div class="actions">
      <button class="btn ghost" onclick="closeDetail()">취소</button>
      <button class="btn primary" onclick="submitPost()">🌟 등록!</button>
    </div>`;
  $('detail-modal').classList.add('open');
}

window.submitPost = async function(){
  if(!aiData||!shot){toast('오류가 발생했어요');return;}
  showLoading('동물사전에 등록 중...');
  try{
    const author=$('r-author').value.trim()||'익명';
    const place=$('r-place').value.trim();
    const note=$('r-note').value.trim();
    await push(ref(db,'posts'),{
      uid:myId,author,place,note,
      animalName:aiData.animalName,
      scientificName:aiData.scientificName||'',
      emoji:aiData.emoji||'🦎',
      desc:aiData.desc,
      confidence:aiData.confidence,
      imageData:shot,
      likes:0,
      createdAt:Date.now()
    });
    hideLoading();
    closeDetail();
    shot=''; aiData=null;
    $('preview').style.display='none';
    $('cam-empty').style.display='grid';
    $('ai-btn').style.display='none';
    $('ai-area').innerHTML='';
    toast('🎉 동물사전에 등록됐어요!');
    go('home');
  }catch(e){
    hideLoading();
    toast('등록 실패: '+e.message);
  }
}

// ── 상세 모달 ─────────────────────────────────────────────────
window.openDetail = function(postId){
  const p = allPosts.find(x=>x.id===postId);
  if(!p) return;
  const liked=!!myLikes[postId];
  const isOwner=p.uid===myId;
  $('detail-body').innerHTML=`
    ${p.imageData?`<img class="modal-img" src="${p.imageData}" alt="">`:
      `<div class="modal-placeholder">${p.emoji||'🦎'}</div>`}
    <div class="modal-animal">${p.emoji||'🦎'} ${esc(p.animalName)}</div>
    <div class="modal-sub">${esc(p.scientificName||'')} · by ${esc(p.author||'익명')}</div>
    <div class="modal-desc">${esc(p.desc||'')}</div>
    ${p.place?`<div style="color:var(--muted);font-size:13px;margin-bottom:8px">📍 ${esc(p.place)}</div>`:''}
    ${p.note?`<div style="color:var(--muted);font-size:13px;margin-bottom:12px;font-style:italic">"${esc(p.note)}"</div>`:''}
    <div class="actions">
      <button class="btn ghost" onclick="closeDetail()">닫기</button>
      <button class="like-btn ${liked?'liked':''}" style="border-radius:8px;padding:12px;justify-content:center;font-size:14px" onclick="toggleLike('${p.id}');closeDetail()">
        ${liked?'❤️':'🤍'} ${p.likes||0} 좋아요
      </button>
    </div>
    ${isOwner?`<button class="btn danger" style="margin-top:8px" onclick="deletePost('${p.id}')">삭제하기</button>`:''}`;
  $('detail-modal').classList.add('open');
}

window.deletePost = async function(postId){
  if(!confirm('이 동물을 삭제할까요?')) return;
  await set(ref(db,`posts/${postId}`), null);
  closeDetail();
  toast('삭제됐어요');
}

window.closeDetail = ()=>$('detail-modal').classList.remove('open');

// ── 유틸 ─────────────────────────────────────────────────────
function showLoading(txt){
  $('loading-text').textContent=txt||'로딩 중...';
  $('loading').classList.add('show');
}
function hideLoading(){ $('loading').classList.remove('show'); }

window.toast = function(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window.__t); window.__t=setTimeout(()=>t.classList.remove('show'),2200);
}

window.go = function(id){
  document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $('page-'+id).classList.add('active');
  if(id!=='capture') stopCamera();
}
document.querySelectorAll('.nav').forEach(b=>b.addEventListener('click',()=>go(b.dataset.page)));
$('detail-modal').addEventListener('click',e=>{if(e.target.id==='detail-modal')closeDetail()});

if('serviceWorker'in navigator&&location.protocol!=='file:')
  navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
